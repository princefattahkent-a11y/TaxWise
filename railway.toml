# railway.toml — Railway deployment configuration
# Docs: https://docs.railway.com/reference/config-as-code

[build]
# Use our Dockerfile instead of Nixpacks auto-detection
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# NEXT_PUBLIC_ vars must exist at BUILD time so Next.js can
# embed them into the client bundle. Set these in the Railway
# dashboard under: Service → Variables (toggle "Available at build time").
buildArgs = { NEXT_PUBLIC_SUPABASE_URL = "$NEXT_PUBLIC_SUPABASE_URL", NEXT_PUBLIC_SUPABASE_ANON_KEY = "$NEXT_PUBLIC_SUPABASE_ANON_KEY" }

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
